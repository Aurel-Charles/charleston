name: Fetch Facebook Events

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: "0 6 * * *"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  fetch-events:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch events from Facebook API
        env:
          PAGE_ID: ${{ secrets.PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: node scripts/fetch-events.js

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json static/images/events/
          if git diff --cached --quiet; then
            echo "No changes to commit — events are up to date."
          else
            git commit -m "chore: update events [skip ci]"
            git push
          fi
