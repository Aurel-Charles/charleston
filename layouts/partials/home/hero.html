<section class="relative min-h-[90vh] flex items-center overflow-hidden bg-creme">

  <div class="absolute right-0 top-0 bottom-0 w-1/2 flex items-center justify-end pointer-events-none">
    <div class="w-[80%] aspect-square bg-sauge/15 rounded-l-full"></div>
  </div>

  <div class="relative z-10 max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-24 w-full">
    <p class="label mb-6">{{ .Params.label }}</p>
    <h1 class="font-display font-black text-7xl sm:text-8xl lg:text-[9rem] uppercase text-encre leading-none mb-8">
      Le<br /><span class="text-sauge">Charleston</span>
    </h1>
    <p class="text-encre/70 text-xl sm:text-2xl max-w-sm mb-10 leading-snug font-sans">
      {{ .Params.tagline }}
    </p>
    <div class="flex flex-wrap gap-4">
      <a href="{{ "/programmation/" | relURL }}" class="btn-primary">Voir les concerts</a>
      <a href="{{ site.Params.facebook }}" target="_blank" rel="noopener noreferrer" class="btn-outline">Nous suivre</a>
    </div>
  </div>

</section>
