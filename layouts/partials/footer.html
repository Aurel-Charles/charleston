<footer class="bg-encre mt-24" id="contact">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-12">

      <!-- Brand -->
      <div>
        <div class="mb-5">
          <span class="font-display font-black text-creme uppercase tracking-wide text-2xl leading-none">Le Charleston</span>
        </div>
        <p class="text-creme/50 text-sm leading-relaxed">
          Café · Concert · Amiens<br />
          Ouvert mar–sam dès 18h.
        </p>
      </div>

      <!-- Infos pratiques -->
      <div>
        <p class="label text-sauge mb-4">Infos pratiques</p>
        <ul class="space-y-2 text-sm text-creme/60">
          <li><i class="fa fa-map-marker w-4 text-sauge/70 mr-1"></i> {{ site.Params.address }}</li>
          <li>
            <a href="mailto:{{ site.Params.email }}" class="hover:text-sauge transition-colors">
              <i class="fa fa-envelope-o w-4 text-sauge/70 mr-1"></i> {{ site.Params.email }}
            </a>
          </li>
          <li><i class="fa fa-clock-o w-4 text-sauge/70 mr-1"></i> Mar–Sam · 18h–2h</li>
        </ul>
      </div>

      <!-- Suivre -->
      <div>
        <p class="label text-sauge mb-4">Suivre</p>
        <a
          href="{{ site.Params.facebook }}"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-outline-light py-2 px-4 text-xs"
        >
          <i class="fa fa-facebook-square mr-1"></i> Facebook
        </a>
      </div>

    </div>

    <div class="border-t border-creme/10 mt-12 pt-8 text-center font-mono text-xs text-creme/20 tracking-widest uppercase">
      © {{ now.Year }} Le Charleston · Amiens
    </div>
  </div>
</footer>
