<header class="fixed top-0 left-0 right-0 z-50 bg-creme/95 backdrop-blur-sm border-b border-encre/10">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="{{ "/" | relURL }}" class="flex items-center">
        <img src="/logo.svg" alt="Le Charleston" class="h-10 w-auto" />
      </a>

      <!-- Desktop nav -->
      <nav class="hidden md:flex items-center gap-8">
        <a href="{{ "/" | relURL }}" class="font-mono text-xs uppercase tracking-widest text-encre hover:text-sauge transition-colors">Accueil</a>
        <a href="{{ "/programmation/" | relURL }}" class="font-mono text-xs uppercase tracking-widest text-encre hover:text-sauge transition-colors">Programmation</a>
        <a href="{{ "/#contact" | relURL }}" class="font-mono text-xs uppercase tracking-widest text-encre hover:text-sauge transition-colors">Contact</a>
        <a href="{{ site.Params.facebook }}" target="_blank" rel="noopener noreferrer" class="btn-primary py-2 px-4 text-xs">
          Facebook
        </a>
      </nav>

      <!-- Mobile menu button -->
      <button
        id="menu-toggle"
        class="md:hidden text-encre hover:text-sauge transition-colors"
        aria-label="Ouvrir le menu"
        onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile nav -->
  <div id="mobile-menu" class="hidden md:hidden bg-creme border-t border-encre/10">
    <nav class="flex flex-col px-4 py-4 gap-4">
      <a href="{{ "/" | relURL }}" class="font-mono text-xs uppercase tracking-widest text-encre hover:text-sauge transition-colors">Accueil</a>
      <a href="{{ "/programmation/" | relURL }}" class="font-mono text-xs uppercase tracking-widest text-encre hover:text-sauge transition-colors">Programmation</a>
      <a href="{{ "/#contact" | relURL }}" class="font-mono text-xs uppercase tracking-widest text-encre hover:text-sauge transition-colors">Contact</a>
      <a href="{{ site.Params.facebook }}" target="_blank" rel="noopener noreferrer" class="btn-primary py-2 px-4 text-xs self-start">Facebook</a>
    </nav>
  </div>
</header>
