<header class="fixed top-0 left-0 right-0 z-50 bg-gray-950/90 backdrop-blur-sm border-b border-gray-800">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo / Site name -->
      <a href="{{ "/" | relURL }}" class="flex items-center gap-2 group">
        <span class="text-amber-400 text-2xl">♪</span>
        <span class="font-serif text-xl font-bold text-white group-hover:text-amber-400 transition-colors">Le Charleston</span>
      </a>

      <!-- Desktop nav -->
      <nav class="hidden md:flex items-center gap-8">
        <a href="{{ "/" | relURL }}" class="text-gray-300 hover:text-amber-400 transition-colors text-sm font-medium tracking-wide uppercase">Accueil</a>
        <a href="{{ "/programmation/" | relURL }}" class="text-gray-300 hover:text-amber-400 transition-colors text-sm font-medium tracking-wide uppercase">Programmation</a>
        <a href="{{ "/#contact" | relURL }}" class="text-gray-300 hover:text-amber-400 transition-colors text-sm font-medium tracking-wide uppercase">Contact</a>
        <a href="{{ site.Params.facebook }}" target="_blank" rel="noopener noreferrer" class="btn-outline text-xs py-2 px-4">
          Facebook
        </a>
      </nav>

      <!-- Mobile menu button -->
      <button
        id="menu-toggle"
        class="md:hidden text-gray-300 hover:text-amber-400 transition-colors"
        aria-label="Ouvrir le menu"
        onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile nav -->
  <div id="mobile-menu" class="hidden md:hidden bg-gray-950 border-t border-gray-800">
    <nav class="flex flex-col px-4 py-4 gap-4">
      <a href="{{ "/" | relURL }}" class="text-gray-300 hover:text-amber-400 transition-colors text-sm font-medium tracking-wide uppercase">Accueil</a>
      <a href="{{ "/programmation/" | relURL }}" class="text-gray-300 hover:text-amber-400 transition-colors text-sm font-medium tracking-wide uppercase">Programmation</a>
      <a href="{{ "/#contact" | relURL }}" class="text-gray-300 hover:text-amber-400 transition-colors text-sm font-medium tracking-wide uppercase">Contact</a>
      <a href="{{ site.Params.facebook }}" target="_blank" rel="noopener noreferrer" class="btn-outline text-xs py-2 px-4 self-start">Facebook</a>
    </nav>
  </div>
</header>
